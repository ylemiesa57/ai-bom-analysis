name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # playwright is only needed by ai_image_creation.py's headless
          # screenshot rendering, which needs a separate browser-download
          # step this workflow doesn't do -- everything else only needs
          # the packages below.
          pip install networkx numpy scipy pandas plotly pyvis pillow
      - name: Byte-compile all modules
        run: python -m py_compile ai_bom/*.py
      - name: Import check
        run: python -c "import ai_bom"
